<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="MJH Studio - Professional Creative Suite with HTML Editor, Blockly, Advanced Video Editor & Drag & Drop Builder">
    <title>MJH Studio - Creative Suite</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e6f5c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <!-- Google AdMob -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4876264020851039" crossorigin="anonymous"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- FFmpeg.wasm - Updated to jsDelivr (Fixed CORS issue) -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js"></script>

    <!-- Blockly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blockly.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blocks.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/javascript.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --card: #ffffff;
            --text: #0f172a; --text-sec: #475569; --border: #e2e8f0;
            --accent: #1e6f5c; --soft: #f1f5f9; --success: #10b981;
        }
        body.dark {
            --bg: #0f172a; --surface: #1e2937; --card: #1e2937;
            --text: #f1f5f9; --text-sec: #cbd5e1; --border: #334155;
            --accent: #2dd4bf; --soft: #1e2937;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }
        
        #splash {
            position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3000; transition: opacity 0.8s ease; color: white; text-align: center;
        }
        .splash-title { font-size: 46px; font-weight: 900; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; color: transparent; }
        .spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.25); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .main-app { display: none; height: 100dvh; flex-direction: column; }
        .app-header { background: var(--surface); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-studio { background: linear-gradient(135deg,#1e6f5c,#289672); padding: 8px 24px; border-radius: 50px; color: white; font-weight: 800; font-size: 1.45rem; }

        .pages-container { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; inset: 0; overflow-y: auto; padding: 18px; padding-bottom: 95px; opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
        .page.active { opacity: 1; visibility: visible; }

        .bottom-nav { background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px 4px; flex-shrink: 0; }
        .nav-btn { background: none; border: none; color: var(--text-sec); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 10px; border-radius: 30px; }
        .nav-btn.active { color: var(--accent); background: var(--soft); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 18px; margin-bottom: 18px; }
        button.primary { background: var(--accent); color: white; border: none; padding: 10px 22px; border-radius: 50px; font-weight: 600; cursor: pointer; }
        button.success { background: var(--success); color: white; }
        textarea, input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--card); margin: 8px 0; }
        iframe { width: 100%; border-radius: 24px; border: 1px solid var(--border); min-height: 320px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
        .back-btn { background: var(--soft); padding: 8px 18px; border-radius: 50px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
    <div class="splash-title">MJH STUDIO</div>
    <p style="margin:15px 0 25px; color:#94a3b8;">Creative Suite • HTML • Blockly • Video • Builder</p>
    <div class="spinner"></div>
</div>

<!-- GDPR -->
<div id="gdprConsent" style="position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:4px solid var(--accent);padding:20px;z-index:5000;display:none;flex-direction:column;gap:15px;box-shadow:0 -5px 30px rgba(0,0,0,0.35);">
    <p><i class="fas fa-shield-alt"></i> We use ads and cookies to keep this app free. Do you accept?</p>
    <div style="display:flex;gap:12px;">
        <button id="acceptAds" class="primary" style="flex:1;">Accept All</button>
        <button id="declineAds" style="flex:1;background:#64748b;color:white;">Decline</button>
    </div>
</div>

<div class="main-app" id="mainApp">
    <!-- Header, Pages, Bottom Nav - Same as previous version -->
    <!-- (To save space, I'm keeping only the changed Video Editor part prominent. Paste other pages from previous message if needed) -->

    <!-- Video Editor Page (Important part) -->
    <div class="page" id="pageVideo">
        <button class="back-btn" onclick="navigateTo('home')"><i class="fas fa-arrow-left"></i> Back</button>
        <h2>🎥 Video Studio (FFmpeg)</h2>
        <div class="card">
            <input type="file" id="videoUpload" accept="video/*">
            <video id="videoPreview" controls style="width:100%; max-height:260px; margin-top:12px; border-radius:16px;"></video>
        </div>
        <div class="card">
            <h3>Editing Tools</h3>
            <div class="toolbar">
                <button id="loadFFmpegBtn" class="primary">Load FFmpeg</button>
                <button id="trimVideoBtn">Trim 5s</button>
                <button id="cropVideoBtn">Crop 480p</button>
                <button id="compressVideoBtn">Compress</button>
                <button id="speedVideoBtn">2x Speed</button>
            </div>
            <div id="ffmpegStatus" style="padding:12px;background:var(--soft);border-radius:12px;margin:10px 0;">FFmpeg not loaded yet...</div>
            <div style="height:8px;background:var(--border);border-radius:10px;overflow:hidden;">
                <div id="editProgress" style="height:100%;background:var(--accent);width:0%;transition:width 0.4s;"></div>
            </div>
            <button id="downloadEditedVideoBtn" class="success" style="width:100%;margin-top:15px;">Download Edited Video</button>
        </div>
    </div>

    <!-- Other pages (Home, Editor, Blockly, DragBuilder, Projects) can be added from previous full code -->
</div>

<script>
// ======================= CONFIG =======================
const firebaseConfig = {
    apiKey: "AIzaSyAlA7MDWL2WKC3OH3kxMtkHZ8w5GpSt4y8",
    authDomain: "mjh-studio.firebaseapp.com",
    projectId: "mjh-studio",
    storageBucket: "mjh-studio.firebasestorage.app",
    messagingSenderId: "899252366841",
    appId: "1:899252366841:web:5795ec41a51f2d0c4ba128"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUserId = "guest_user_" + (localStorage.getItem('guest_id') || Math.random().toString(36).substr(2,12));
if (!localStorage.getItem('guest_id')) localStorage.setItem('guest_id', currentUserId);

let ffmpeg = null;
let currentVideoFile = null;
let editedVideoBlob = null;

// ======================= FFmpeg Load Function (Fixed) =======================
async function loadFFmpeg() {
    const status = document.getElementById('ffmpegStatus');
    const progress = document.getElementById('editProgress');
    
    status.textContent = "⏳ Loading FFmpeg (this may take 15-30 seconds)...";
    progress.style.width = "30%";

    try {
        const { FFmpeg } = FFmpegWASM;
        ffmpeg = new FFmpeg();

        await ffmpeg.load({
            corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js'
        });

        status.textContent = "✅ FFmpeg loaded successfully!";
        progress.style.width = "100%";
        setTimeout(() => progress.style.width = "0%", 1500);
    } catch (e) {
        console.error(e);
        status.textContent = "❌ Failed to load FFmpeg. Please try again.";
        progress.style.width = "0%";
    }
}

// ======================= Other functions (navigation, GDPR, dark mode etc.) =======================
// ... (Add from previous full version)

document.getElementById('loadFFmpegBtn').addEventListener('click', loadFFmpeg);

// Remove splash screen
setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
    }, 700);
}, 2000);

console.log("%c✅ MJH Studio Updated - FFmpeg CORS Fixed", "color:#10b981; font-size:15px;");
</script>
</body>
</html>
